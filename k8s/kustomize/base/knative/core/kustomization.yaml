apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/knative/serving/releases/download/knative-v1.21.2/serving-core.yaml
  - https://github.com/knative/net-kourier/releases/download/knative-v1.20.1/kourier.yaml

patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-network
        namespace: knative-serving
      data:
        ingress-class: kourier.ingress.networking.knative.dev
